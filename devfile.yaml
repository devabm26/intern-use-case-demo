schemaVersion: 2.3.0
metadata:
  name: ai-vibe-tool
components:
  - name: tools
    container:
      image: quay.io/che-incubator/cli-ai-tools:latest
      memoryRequest: 1Gi
      memoryLimit: 16Gi
      cpuLimit: '4'
      cpuRequest: '0.5'
      endpoints:
        - name: streamlit-ui
          targetPort: 8501
          exposure: public
          protocol: http
          secure: true
