---
apiVersion: v1
kind: Namespace
metadata:
  name: thoughts-app

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: thought-vibe-dashboard-config
  namespace: thoughts-app
data:
  FLASK_ENV: "production"
  PYTHONUNBUFFERED: "1"
  DB_HOST: "postgresql.thoughts-app.svc.cluster.local"
  DB_NAME: "thoughts"
  DB_PORT: "5432"
  DB_USER: "thoughts"

---
apiVersion: v1
kind: Secret
metadata:
  name: thought-vibe-dashboard-secret
  namespace: thoughts-app
type: Opaque
stringData:
  DB_PASSWORD: "thoughts123"  # Change this to a secure password!
  SECRET_KEY: "change-this-to-random-secret-key"  # Flask secret key

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: thought-vibe-dashboard
  namespace: thoughts-app
  labels:
    app: thought-vibe-dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: thought-vibe-dashboard
  template:
    metadata:
      labels:
        app: thought-vibe-dashboard
    spec:
      containers:
      - name: dashboard
        image: quay.io/redhat_na_ssa/thoughts-vibe-dashboard:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          name: http
          protocol: TCP
        env:
        - name: FLASK_ENV
          valueFrom:
            configMapKeyRef:
              name: thought-vibe-dashboard-config
              key: FLASK_ENV
        - name: PYTHONUNBUFFERED
          valueFrom:
            configMapKeyRef:
              name: thought-vibe-dashboard-config
              key: PYTHONUNBUFFERED
        - name: DB_HOST
          valueFrom:
            configMapKeyRef:
              name: thought-vibe-dashboard-config
              key: DB_HOST
        - name: DB_NAME
          valueFrom:
            configMapKeyRef:
              name: thought-vibe-dashboard-config
              key: DB_NAME
        - name: DB_PORT
          valueFrom:
            configMapKeyRef:
              name: thought-vibe-dashboard-config
              key: DB_PORT
        - name: DB_USER
          valueFrom:
            configMapKeyRef:
              name: thought-vibe-dashboard-config
              key: DB_USER
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: thought-vibe-dashboard-secret
              key: DB_PASSWORD
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: thought-vibe-dashboard-secret
              key: SECRET_KEY
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5
          timeoutSeconds: 3
      imagePullSecrets:
      - name: quay-auth-secret

---
apiVersion: v1
kind: Service
metadata:
  name: thought-vibe-dashboard
  namespace: thoughts-app
  labels:
    app: thought-vibe-dashboard
spec:
  type: ClusterIP
  selector:
    app: thought-vibe-dashboard
  ports:
  - name: http
    port: 80
    targetPort: 8080
    protocol: TCP

---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: thought-vibe-dashboard
  namespace: thoughts-app
  labels:
    app: thought-vibe-dashboard
spec:
  to:
    kind: Service
    name: thought-vibe-dashboard
    weight: 100
  port:
    targetPort: http
  tls:
    termination: edge
    insecureEdgeTerminationPolicy: Redirect
  wildcardPolicy: None
